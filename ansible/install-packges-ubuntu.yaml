- name: Install Ubuntu Packages
  hosts: localhost

  pre_tasks:

  - name: Install sch, used to compile shell script
    shell: | 
          wget https://github.com/neurobin/shc/archive/refs/tags/4.0.3.tar.gz
          tar xvfz 4.0.3.tar.gz
          cd shc-4.0.3
          ./configure
          make
          make install
          cd ..
          rm -rf shc-4.0.3
          rm -rf xvfz 4.0.3.tar.gz
    args:
      executable: /bin/bash
    tags:
      - install
      - core
    become: true

  - name: Update Apt
    apt:
      force_apt_get: true
      update_cache: true
      state: present
    become: true

  tasks:
    # this block of tasks will use sudo to install packages
    - block:
        # - include: tasks/k8.yaml

        - name: Install System Packages
          apt:
            name: ["zsh", "ffmpeg", "fzf", "bat", "ranger", "unzip", "zip", "tldr", "stow", "mpv", "tmux", "make", "python3-pip"]
          tags:
            - install
            - core
      become: true

    - import_tasks: tasks/neovim.yaml
    - import_tasks: tasks/neovim.yaml
    # - include: tasks/kubectx.yaml
    # - include: tasks/stern.yaml


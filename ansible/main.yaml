---
- name: Intro to Ansible Playbooks
  hosts: localhost
  gather_facts: yes # Ensure facts are gathered, aka the distribution
  tasks:
    - include_tasks: tasks/env.yaml
    - include_tasks: tasks/ssh.yaml
    - include_tasks: tasks/git.yaml
    - include_tasks: tasks/himalaya.yaml
      tags:
        - himalaya
        - install
        - dotfiles
    - include_tasks: tasks/rust.yaml
    - include_tasks: tasks/tmux.yaml

    # Install OS specific packages
    - include_tasks: packages-ubuntu.yaml
      when: ansible_facts['distribution'] == "Ubuntu" or ansible_facts['distribution'] == "Pop!_OS"
      tags:
        - always

    - include_tasks: packages-macos.yaml
      when: ansible_facts['os_family'] == "Darwin"

    - name: Stow all config files
      shell: |
        cd ../configs/
        stow -t "{{ lookup('env', 'HOME') }}" */
      args:
        executable: /bin/bash
      tags:
        - install
        - dotfiles
        - stow

    - name: Install tmux plugins via TPM
      shell: ~/.tmux/plugins/tpm/bin/install_plugins
      tags:
        - install
        - dotfiles
        - tmux

    - name: Add zsh to .bashrc
      lineinfile:
        path: "{{ lookup('env', 'HOME') }}/.bashrc"
        regexp: "zsh"
        line: "zsh"
        state: present
        create: yes
      tags:
        - install
        - dotfiles

    - name: Add zsh configs to main .zshrc
      lineinfile:
        path: "{{ lookup('env', 'HOME') }}/.zshrc"
        regexp: "^source ~/.zshrc_init"
        line: "source ~/.zshrc_init"
        state: present
        create: yes
      tags:
        - install
        - dotfiles

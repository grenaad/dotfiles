---
- name: Install MacOS Packages

  vars:
    homebrew_installed_packages:
      - neovim
      - jq
      - tmux
      - ffmpeg
      - fzf
      - kubectx
      - nvm
      - pyenv
      - stern
      - tlrc
      - tmux
      - gnu-sed
      - bat
      - rustup
      - duti
      - bash
      - kustomize
      - lazygit
      - k9s
      - btop
      - ata
      - httpie
      - jira-cli
      - stow
      - git-delta
      - ruff
      - go
      - delve
      - parallel
      - bottom
      - goose
      - sst/tap/opencode
      - txn2/tap/kubefwd # port forword to kubernetes
      - gh # Github CLI
      - bun
      - uv
      - gogcli # Google Suite CLI (Gmail, Calendar, Drive, etc.)

      # yazi and all its dependencies
      - yazi # yazi, and it's dependencies
      - ffmpeg # for video thumbnails
      - sevenzip # for archive extraction and preview
      - jq # for JSON preview
      - poppler # for PDF preview
      - fd # for file searching
      - ripgrep # for file content searching
      - fzf # for quick file subtree navigation, >= 0.53.0
      - zoxide # for historical directories navigation, requires fzf
      - resvg # for SVG preview
      - imagemagick # for Font, HEIC, and JPEG XL preview
      - font-symbols-only-nerd-font

      # SketchyBar font
      - sf-pro
      - font-sketchybar-app-font

      - cliproxyapi
      - p7zip
      - ocrmypdf

    homebrew_cask_apps:
      - docker
      - firefox
      - google-chrome
      - chromedriver
      - mpv
      - slack
      - zoom
      - firefox
      - obs
      - postman
      - transmission
      - onlyoffice
      - zotero
      - whatsapp
      - font-meslo-lg-nerd-font
      - ghostty
      - zen
      - raycast
      - font-jetbrains-mono-nerd-font

      # Aerospace and SketchyBar
      - nikitabobko/tap/aerospace
      - FelixKratz/formulae/sketchybar
      - FelixKratz/formulae/borders
      - sf-symbols # SketchyBar font

      - notunes # Stops Music/iTunes from launching, need to add the login item in System Preferences

    homebrew_taps:
      - ankitpokhrel/jira-cli
      - oven-sh/bun

  roles:
    - geerlingguy.mac.homebrew

  tasks:
    - include_tasks: tasks/mpv.yaml
    # - include_tasks: tasks/meridian.yaml

    - name: Stop and unload cliproxyapi brew service
      shell: |
        brew services stop cliproxyapi
        launchctl bootout gui/$(id -u) ~/Library/LaunchAgents/homebrew.mxcl.cliproxyapi.plist 2>/dev/null || true
      failed_when: false
      tags:
        - install
        - packages

    - name: Load custom cliproxyapi service
      shell: launchctl bootstrap gui/$(id -u) ~/Library/LaunchAgents/com.cliproxyapi.plist
      register: cliproxyapi_load
      changed_when: cliproxyapi_load.rc == 0
      failed_when: false
      tags:
        - install
        - packages

---
# Install packages with sudo
- name: Install System Packages
  apt:
    name: [
        "wl-clipboard",
        "zsh",
        "ffmpeg",
        "unzip",
        "zip",
        "stow",
        "mpv",
        "parallel",
        "tmux",
        "build-essential",
      ]
  become: true
  tags:
    - install
    - dotfiles
    - packages

- include_tasks: tasks/vscode.yaml
- import_tasks: tasks/homebrew.yaml
- import_tasks: tasks/nvm.yaml
- import_tasks: tasks/rust.yaml
- import_tasks: tasks/bun.yaml
- import_tasks: tasks/meridian.yaml


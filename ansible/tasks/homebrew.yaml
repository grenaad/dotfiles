- name: Check if Homebrew is already installed
  stat:
    path: /home/linuxbrew/.linuxbrew/bin/brew
  register: brew_installed
  tags:
    - install
    - homebrew

- name: Create Homebrew directory
  become: true
  file:
    path: /home/linuxbrew/.linuxbrew
    state: directory
    owner: "{{ ansible_facts['user_id'] }}"
    group: "{{ ansible_facts['user_id'] }}"
    mode: "0755"
  when: not brew_installed.stat.exists
  tags:
    - install
    - homebrew

- name: Install Homebrew
  become: false
  shell: |
    /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  args:
    executable: /bin/bash
  environment:
    NONINTERACTIVE: "1"
  when: not brew_installed.stat.exists
  tags:
    - install
    - homebrew

- name: Add Homebrew to bashrc
  become: false
  lineinfile:
    path: "{{ lookup('env', 'HOME') }}/.bashrc"
    line: 'eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"'
    create: yes
  when: ansible_facts['os_family'] == "Debian"
  tags:
    - install
    - homebrew

- name: Install Homebrew packages
  become: false
  community.general.homebrew:
    name:
      - bat
      - fzf
      - git-delta
      - gogcli # Google Suite CLI (Gmail, Calendar, Drive, etc.)
      - lazygit
      - neovim
      - sst/tap/opencode
      - ripgrep
      - tlrc
      - uv
      - yazi
      - p7zip
    state: present
    path: /home/linuxbrew/.linuxbrew/bin
  tags:
    - install
    - homebrew
    - packages

- name: Install cliproxyapi via Linux installer
  become: false
  shell: |
    curl -fsSL https://raw.githubusercontent.com/brokechubb/cliproxyapi-installer/refs/heads/master/cliproxyapi-installer | bash
  args:
    executable: /bin/bash
  tags:
    - install
    - homebrew

- name: Reload systemd user daemon
  become: false
  ansible.builtin.systemd:
    daemon_reload: yes
    scope: user
  tags:
    - install
    - homebrew

- name: Enable and start cliproxyapi systemd service
  become: false
  ansible.builtin.systemd:
    name: cliproxyapi
    enabled: yes
    state: started
    scope: user
  tags:
    - install
    - homebrew
